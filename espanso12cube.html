<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>12 Sequenze — Cubo 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const SEQUENCES = [
  { cells:[10,6,7,11,10], hue:[30,140,255], glow:[50,180,255], particle:[120,220,255], core:[220,245,255] },
  { cells:[10,6,10,7,11,6,10,9,10,14,10], hue:[255,140,30], glow:[255,180,50], particle:[255,200,80], core:[255,240,200] },
  { cells:[10,13,10,6,7,3,4,8,7,11,6,1,2,5,6,10,11,12,16,15,10], hue:[255,220,30], glow:[255,240,60], particle:[255,245,120], core:[255,255,220] },
  { cells:[10,6,7,11,10,7,6,11,7,3,6,5,1,2,6,10,14,13,10,7,4,8,12,16,11,10,10], hue:[30,220,80], glow:[60,255,100], particle:[100,255,140], core:[210,255,220] },
  { cells:[10,7,6,11,10,7,4,3,8,7,10,6,2,3,7,12,11,15,16,11,12,8,3,4,3,2,7,6,10], hue:[140,50,255], glow:[160,80,255], particle:[190,140,255], core:[230,215,255] },
  { cells:[10,7,4,3,8,7,2,1,5,6,3,2,7,11,10,15,14,9,10], hue:[255,40,160], glow:[255,70,180], particle:[255,130,210], core:[255,215,240] },
  { cells:[10,5,2,3,8,11,12,15,16,11,6,1,5,9,13,14,9,10,5,6,7,8,4,7,3,2,6,10], hue:[0,210,230], glow:[30,235,250], particle:[100,250,255], core:[200,255,255] },
  { cells:[10,6,2,2,2,3,3,2,1,1,1,5,6,7,4,8,7,12,15,11,11,11,6,11,6,11,7,8,11,12,15,11,10], hue:[255,50,50], glow:[255,80,70], particle:[255,140,120], core:[255,220,210] },
  { cells:[10,6,2,1,5,9,13,14,15,16,12,8,4,3,7,10,13,9,5,1,6,6,3,2,1,5,10,11,15,16,11,6,1,2,6,3,6,11,15,14,11,6,9,5,2,7,4,8,12,15,10,10,10], hue:[255,110,150], glow:[255,140,170], particle:[255,180,200], core:[255,230,240] },
  { cells:[10,11,6,7,10,11,6,7,4,8,3,7,2,6,1,5,9,14,13,10,9,10,10,11,15,16,12,11,16,15,12,11,10,7,4,3,2,1,6,11,14,13,10,7,8,12,11,10,9,5,6,10], hue:[0,190,160], glow:[30,220,190], particle:[90,245,225], core:[200,255,248] },
  { cells:[10,9,5,1,6,7,4,3,2,7,12,11,10,9,5,1,6,3,2,7,4,8,11,15,14,11,10,15,14,11,6,3,7,10,13,14,10,11,15,10], hue:[160,255,30], glow:[180,255,65], particle:[210,255,130], core:[235,255,215] },
  { cells:[10,7,4,3,8,7,2,6,3,2,1,6,5,9,10,13,14,11,15,10], hue:[180,190,255], glow:[200,210,255], particle:[220,225,255], core:[245,248,255] }
];

// ═══════════════════════════════════════════════════════
// TIMING (same as espanso12allv2)
// ═══════════════════════════════════════════════════════
const HOLD_T=600, MOVE_T=500, PULSE_T=500, PAUSE_T=800, FADEOUT_T=600;

function ease(t){ return t<.5?2*t*t:-1+(4-2*t)*t; }

// ═══════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════
let W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060610);
scene.fog = new THREE.FogExp2(0x060610, 0.01);

const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 300);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x223344, 0.4));

// ═══════════════════════════════════════════════════════
// CUBE GEOMETRY
// ═══════════════════════════════════════════════════════
const CELL_SP = 2.2;
const GRID_SIDE = CELL_SP * 3; // 6.6 — from cell center to cell center across 3 gaps
// Cube born from the grid corners: half-side = 1.5 * CELL_SP (reaches cell 1,4,13,16)
const halfC = 1.5 * CELL_SP; // 3.3 — exact grid extent
const CUBE_SIDE = halfC * 2; // 6.6 — true cube, side = grid
const CUBE_H = CUBE_SIDE;
const LAYER_GAP = CUBE_H / 11;

function cellXZ(c){
  const n=c-1;
  return { x:(n%4-1.5)*CELL_SP, z:(Math.floor(n/4)-1.5)*CELL_SP };
}
function layerY(i){ return i*LAYER_GAP; }

// Cube wireframe — edges exactly at the 4 corner cells of the grid
const cubeCenter = CUBE_H / 2;
const yBot = cubeCenter - halfC;
const yTop = cubeCenter + halfC;

const edgeMat = new THREE.LineBasicMaterial({color:0x4477cc, transparent:true, opacity:0.55});
const corners = [
  [-halfC,yBot,-halfC],[halfC,yBot,-halfC],[halfC,yBot,halfC],[-halfC,yBot,halfC],
  [-halfC,yTop,-halfC],[halfC,yTop,-halfC],[halfC,yTop,halfC],[-halfC,yTop,halfC]
];
[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(([a,b])=>{
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...corners[a]),new THREE.Vector3(...corners[b])]),
    edgeMat
  ));
});

// Transparent cube faces
const faceGeo = new THREE.BoxGeometry(CUBE_SIDE, CUBE_SIDE, CUBE_SIDE);
const faceMat = new THREE.MeshBasicMaterial({color:0x0a1830, transparent:true, opacity:0.03, side:THREE.DoubleSide, depthWrite:false});
const faceM = new THREE.Mesh(faceGeo, faceMat);
faceM.position.y = cubeCenter;
scene.add(faceM);

// ═══════════════════════════════════════════════════════
// RENDER TEXTURES — one Canvas2D per layer
// ═══════════════════════════════════════════════════════
const TEX_SZ = 512;
const layers = [];

// Symbol drawing (same as espanso12allv2)
function drawSym(ctx, idx, cx, cy, sz, a){
  ctx.save();
  const col = `rgba(180,200,230,${a})`;
  ctx.fillStyle=col; ctx.strokeStyle=col;
  ctx.lineWidth=Math.max(0.6,sz*0.06);
  ctx.lineCap='round'; ctx.lineJoin='round';
  const s=sz*0.6;
  const numMap={10:'1',6:'2',7:'3',11:'4'};
  switch(idx){
    case 1:case 2:case 5:{
      const ch=idx===1?'B':idx===2?'C':'A';
      ctx.font=`600 ${sz*1.1}px Georgia,serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ch,cx,cy+sz*0.03);
    }break;
    case 6:case 7:case 10:case 11:{
      ctx.font=`700 ${sz*1.15}px Arial,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(numMap[idx],cx,cy+sz*0.04);
    }break;
    case 3:
      ctx.beginPath();ctx.moveTo(cx-s*.5,cy);ctx.lineTo(cx+s*.5,cy);
      ctx.moveTo(cx,cy-s*.5);ctx.lineTo(cx,cy+s*.5);ctx.stroke();break;
    case 4:
      ctx.beginPath();ctx.moveTo(cx-s*.4,cy-s*.16);ctx.lineTo(cx+s*.4,cy-s*.16);
      ctx.moveTo(cx-s*.4,cy+s*.16);ctx.lineTo(cx+s*.4,cy+s*.16);ctx.stroke();break;
    case 8:
      ctx.beginPath();ctx.moveTo(cx-s*.4,cy);ctx.lineTo(cx+s*.4,cy);ctx.stroke();break;
    case 9:{const h=s*.3;ctx.strokeRect(cx-h,cy-h,h*2,h*2);}break;
    case 12:
      ctx.beginPath();ctx.arc(cx,cy,s*.38,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fill();break;
    case 13:
      ctx.beginPath();ctx.arc(cx,cy,s*.38,0,Math.PI*2);ctx.stroke();break;
    case 14:{
      const r=s*.4;ctx.beginPath();ctx.moveTo(cx,cy-r);
      ctx.lineTo(cx+r*.87,cy+r*.5);ctx.lineTo(cx-r*.87,cy+r*.5);ctx.closePath();ctx.stroke();
    }break;
    case 15:{
      const or_=s*.42,ir_=or_*.38;ctx.beginPath();
      for(let i=0;i<10;i++){const ang=-Math.PI/2+i*Math.PI/5;const r=i%2?ir_:or_;
        ctx[i?'lineTo':'moveTo'](cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);}
      ctx.closePath();ctx.stroke();
    }break;
    case 16:{
      const mr=s*.38,off=mr*.4,ir=mr*.75;
      const xi=(ir*ir-mr*mr-off*off)/(2*off),yi2=mr*mr-xi*xi;
      if(yi2>0){const yi=Math.sqrt(yi2);ctx.beginPath();
        ctx.arc(cx,cy,mr,Math.atan2(-yi,xi),Math.atan2(yi,xi),false);
        ctx.arc(cx-off,cy,ir,Math.atan2(yi,xi+off),Math.atan2(-yi,xi+off),true);
        ctx.closePath();ctx.fill();}
    }break;
  }
  ctx.restore();
}

function makeLayerState(){
  return {step:0,phase:'fadein',pt:0,trail:[],glow:new Float32Array(16),pathSegments:[],lineOpacity:1,fc:0};
}

function gridXY(cellIdx, cellSp){
  const n=cellIdx-1;
  const margin = cellSp*0.5;
  return {x:margin+(n%4)*cellSp, y:margin+(Math.floor(n/4))*cellSp};
}

for(let li=0;li<12;li++){
  const can = document.createElement('canvas');
  can.width = TEX_SZ; can.height = TEX_SZ;
  const ctx = can.getContext('2d');
  const tex = new THREE.CanvasTexture(can);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  const planeSz = CUBE_SIDE;
  const geo = new THREE.PlaneGeometry(planeSz, planeSz);
  const mat = new THREE.MeshBasicMaterial({
    map:tex, transparent:true, opacity:0.92, side:THREE.DoubleSide, depthWrite:false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.y = layerY(li);
  scene.add(mesh);

  layers.push({
    canvas:can, ctx, tex, mesh, state:makeLayerState(),
    cellSp: TEX_SZ/4.5
  });
}

// ═══════════════════════════════════════════════════════
// ADVANCE STEP (same logic as espanso12allv2)
// ═══════════════════════════════════════════════════════
function advanceStep(si, now){
  const seq=SEQUENCES[si], st=layers[si].state;
  const from=seq.cells[st.step], to=seq.cells[st.step+1];
  if(from!==to) st.pathSegments.push({from,to});
  st.step++;
  if(st.step>=seq.cells.length-1){st.phase='fadeout';st.pt=now;st.trail=[];}
  else{st.phase='hold';st.pt=now;}
}

// ═══════════════════════════════════════════════════════
// RENDER LAYER TO CANVAS (same rendering as espanso12allv2)
// ═══════════════════════════════════════════════════════
function renderLayerCanvas(li, now){
  const L = layers[li];
  const ctx = L.ctx;
  const seq = SEQUENCES[li];
  const st = L.state;
  const cellSp = L.cellSp;
  const box = cellSp * 0.16;

  function xyL(i){ return gridXY(i, cellSp); }

  ctx.clearRect(0,0,TEX_SZ,TEX_SZ);

  // Phase logic
  const el = now - st.pt;
  st.glow.fill(0);
  let particle = null;

  if(st.phase==='fadeout'){
    const t=Math.min(1,el/FADEOUT_T);
    st.lineOpacity=1-ease(t);
    const cur=seq.cells[st.step];
    st.glow[cur-1]=(1-t)*0.6;
    if(t>=1){st.phase='pause';st.pt=now;st.pathSegments=[];st.lineOpacity=1;}
  } else if(st.phase==='pause'){
    if(el>=PAUSE_T){st.step=0;st.phase='fadein';st.pt=now;st.pathSegments=[];st.lineOpacity=1;st.trail=[];}
  } else if(st.phase==='fadein'){
    const cur=seq.cells[st.step];
    const t=Math.min(1,el/300);
    st.glow[cur-1]=ease(t);
    if(t>=1){st.phase='hold';st.pt=now;}
  } else if(st.phase==='hold'){
    const cur=seq.cells[st.step];
    st.glow[cur-1]=0.9+0.1*Math.cos(el*.005);
    if(el>=HOLD_T){
      const nxt=seq.cells[st.step+1];
      if(cur===nxt){st.phase='pulse';st.pt=now;}
      else{st.phase='flow';st.pt=now;st.trail=[];}
    }
  } else if(st.phase==='pulse'){
    const cur=seq.cells[st.step];
    const t=Math.min(1,el/PULSE_T);
    st.glow[cur-1]=0.5+0.5*Math.sin(t*Math.PI);
    if(t>=1) advanceStep(li,now);
  } else if(st.phase==='flow'){
    const cur=seq.cells[st.step], nxt=seq.cells[st.step+1];
    const t=Math.min(1,el/MOVE_T);
    st.glow[cur-1]=Math.max(0,1-t*1.6);
    if(t>.55) st.glow[nxt-1]=ease((t-.55)/.45);
    const a=xyL(cur),b=xyL(nxt),et=ease(t);
    particle={x:a.x+(b.x-a.x)*et, y:a.y+(b.y-a.y)*et};
    if(st.fc%2===0){st.trail.unshift({...particle});if(st.trail.length>10)st.trail.pop();}
    if(t>=1){st.trail=[];particle=null;advanceStep(li,now);}
  }

  // Grid connectors
  ctx.save();
  ctx.strokeStyle='rgba(60,80,120,0.06)';
  ctx.lineWidth=0.5;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const i=r*4+c+1,p=xyL(i);
    if(c<3){const n=xyL(i+1);ctx.beginPath();ctx.moveTo(p.x+box,p.y);ctx.lineTo(n.x-box,p.y);ctx.stroke();}
    if(r<3){const n=xyL(i+4);ctx.beginPath();ctx.moveTo(p.x,p.y+box);ctx.lineTo(p.x,n.y-box);ctx.stroke();}
  }
  ctx.restore();

  // Persistent path lines
  if(st.pathSegments.length>0){
    ctx.save();ctx.lineCap='round';
    for(let i=0;i<st.pathSegments.length;i++){
      const sg=st.pathSegments[i];
      const a=xyL(sg.from),b=xyL(sg.to);
      const age=1-i/(st.pathSegments.length+5);
      const alpha=st.lineOpacity*(0.3+0.4*age);
      ctx.strokeStyle=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${alpha*0.5})`;
      ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      ctx.strokeStyle=`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${alpha})`;
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    ctx.restore();
  }

  // Active segment
  if(st.phase==='flow'){
    const cur=seq.cells[st.step],nxt=seq.cells[st.step+1];
    if(cur!==nxt){
      const t=Math.min(1,el/MOVE_T),a=xyL(cur),b=xyL(nxt),et=ease(t);
      const ex=a.x+(b.x-a.x)*et,ey=a.y+(b.y-a.y)*et;
      ctx.save();ctx.lineCap='round';
      ctx.strokeStyle=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${st.lineOpacity*0.4})`;
      ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.strokeStyle=`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${st.lineOpacity*0.8})`;
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.restore();
    }
  }

  // Cells — ONLY symbols with glow, NO border squares
  for(let i=1;i<=16;i++){
    const p=xyL(i),g=st.glow[i-1];
    ctx.save();
    if(g>.03){
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,box*3.5);
      gr.addColorStop(0,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},${g*.15})`);
      gr.addColorStop(1,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0)`);
      ctx.fillStyle=gr;
      ctx.fillRect(p.x-box*3.5,p.y-box*3.5,box*7,box*7);
      ctx.shadowColor=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${g*.7})`;
      ctx.shadowBlur=12*g;
    }
    const a=.25+g*.75;
    // NO strokeRect — just the symbol
    ctx.shadowBlur=0;
    drawSym(ctx,i,p.x,p.y,box*.85,a);
    ctx.restore();
  }

  // Trail
  if(st.trail.length && st.phase==='flow'){
    const tr=box*0.7;
    for(let i=0;i<st.trail.length;i++){
      const t=1-i/st.trail.length,tp=st.trail[i];
      ctx.save();
      const gr=ctx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,tr*t);
      gr.addColorStop(0,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${t*.4})`);
      gr.addColorStop(1,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},0)`);
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(tp.x,tp.y,tr*t,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // Particle — radial glow, NO square border
  if(particle){
    ctx.save();
    const pr=box*1.4;
    const gr=ctx.createRadialGradient(particle.x,particle.y,0,particle.x,particle.y,pr);
    gr.addColorStop(0,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},0.85)`);
    gr.addColorStop(.3,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0.3)`);
    gr.addColorStop(1,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0)`);
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(particle.x,particle.y,pr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(${seq.core[0]},${seq.core[1]},${seq.core[2]},0.9)`;
    ctx.beginPath();ctx.arc(particle.x,particle.y,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  st.fc++;
  L.tex.needsUpdate = true;
}

// ═══════════════════════════════════════════════════════
// CAMERA CONTROLS
// ═══════════════════════════════════════════════════════
let camAngle=0.7, camRadius=22, camHeight=10;
let tAngle=0.7, tRadius=22, tHeight=10;
let isDragging=false, prevM={x:0,y:0};

renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevM={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{isDragging=false;});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  tAngle+=(e.clientX-prevM.x)*0.005;
  tHeight=Math.max(-2,Math.min(28,tHeight-(e.clientY-prevM.y)*0.06));
  prevM={x:e.clientX,y:e.clientY};
});
renderer.domElement.addEventListener('wheel',e=>{
  tRadius=Math.max(10,Math.min(45,tRadius+e.deltaY*0.02));
  e.preventDefault();
},{passive:false});

renderer.domElement.addEventListener('touchstart',e=>{isDragging=true;prevM={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
window.addEventListener('touchend',()=>{isDragging=false;});
window.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  tAngle+=(e.touches[0].clientX-prevM.x)*0.005;
  tHeight=Math.max(-2,Math.min(28,tHeight-(e.touches[0].clientY-prevM.y)*0.06));
  prevM={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});

// ═══════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════
let started=false, startT=0;

function animate(now){
  requestAnimationFrame(animate);
  if(!started){started=true;startT=now;for(const L of layers)L.state.pt=now;}

  // Camera
  if(!isDragging) tAngle+=0.0008;
  camAngle+=(tAngle-camAngle)*0.04;
  camRadius+=(tRadius-camRadius)*0.04;
  camHeight+=(tHeight-camHeight)*0.04;
  camera.position.set(
    Math.cos(camAngle)*camRadius,
    camHeight,
    Math.sin(camAngle)*camRadius
  );
  camera.lookAt(0, CUBE_H*0.5, 0);

  // Render each layer canvas
  for(let i=0;i<12;i++) renderLayerCanvas(i, now);

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
