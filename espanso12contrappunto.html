<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espanso 12 – Contrappunto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body><canvas id="c"></canvas>
<script>
(() => {
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');
let W, H, S, CX, CY;
function resize(){
  W=cvs.width=window.innerWidth; H=cvs.height=window.innerHeight;
  S=Math.min(W,H)*0.96; CX=W/2; CY=H/2;
}
resize(); window.addEventListener('resize',resize);
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}

// ─── Sequences ───
const SEQUENCES=[
  {cells:[10,6,7,11,10],hue:[30,140,255],glow:[50,180,255],particle:[120,220,255],core:[220,245,255]},
  {cells:[10,6,10,7,11,6,10,9,10,14,10],hue:[255,140,30],glow:[255,180,50],particle:[255,200,80],core:[255,240,200]},
  {cells:[10,13,10,6,7,3,4,8,7,11,6,1,2,5,6,10,11,12,16,15,10],hue:[255,220,30],glow:[255,240,60],particle:[255,245,120],core:[255,255,220]},
  {cells:[10,6,7,11,10,7,6,11,7,3,6,5,1,2,6,10,14,13,10,7,4,8,12,16,11,10,10],hue:[30,220,80],glow:[60,255,100],particle:[100,255,140],core:[210,255,220]},
  {cells:[10,7,6,11,10,7,4,3,8,7,10,6,2,3,7,12,11,15,16,11,12,8,3,4,3,2,7,6,10],hue:[140,50,255],glow:[160,80,255],particle:[190,140,255],core:[230,215,255]},
  {cells:[10,7,4,3,8,7,2,1,5,6,3,2,7,11,10,15,14,9,10],hue:[255,40,160],glow:[255,70,180],particle:[255,130,210],core:[255,215,240]},
  {cells:[10,5,2,3,8,11,12,15,16,11,6,1,5,9,13,14,9,10,5,6,7,8,4,7,3,2,6,10],hue:[0,210,230],glow:[30,235,250],particle:[100,250,255],core:[200,255,255]},
  {cells:[10,6,2,2,2,3,3,2,1,1,1,5,6,7,4,8,7,12,15,11,11,11,6,11,6,11,7,8,11,12,15,11,10],hue:[255,50,50],glow:[255,80,70],particle:[255,140,120],core:[255,220,210]},
  {cells:[10,6,2,1,5,9,13,14,15,16,12,8,4,3,7,10,13,9,5,1,6,6,3,2,1,5,10,11,15,16,11,6,1,2,6,3,6,11,15,14,11,6,9,5,2,7,4,8,12,15,10,10,10],hue:[255,110,150],glow:[255,140,170],particle:[255,180,200],core:[255,230,240]},
  {cells:[10,11,6,7,10,11,6,7,4,8,3,7,2,6,1,5,9,14,13,10,9,10,10,11,15,16,12,11,16,15,12,11,10,7,4,3,2,1,6,11,14,13,10,7,8,12,11,10,9,5,6,10],hue:[0,190,160],glow:[30,220,190],particle:[90,245,225],core:[200,255,248]},
  {cells:[10,9,5,1,6,7,4,3,2,7,12,11,10,9,5,1,6,3,2,7,4,8,11,15,14,11,10,15,14,11,6,3,7,10,13,14,10,11,15,10],hue:[160,255,30],glow:[180,255,65],particle:[210,255,130],core:[235,255,215]},
  {cells:[10,7,4,3,8,7,2,6,3,2,1,6,5,9,10,13,14,11,15,10],hue:[180,190,255],glow:[200,210,255],particle:[220,225,255],core:[245,248,255]}
];
const HOLD_T=600,MOVE_T=500,PULSE_T=500,PAUSE_T=800,FADEOUT_T=600;
const START_OFFS=Array.from({length:12},(_,i)=>i*420);
let T0=null,NOW=0;
function makeState(){return{step:0,phase:'waiting',pt:0,glow:new Float32Array(16),lineOpacity:1};}
const states=Array.from({length:12},makeState);

// ─── drawSym ───
function drawSym(idx,cx,cy,sz,a){
  ctx.save();
  const col=`rgba(180,200,230,${a})`;
  ctx.fillStyle=col;ctx.strokeStyle=col;
  ctx.lineWidth=Math.max(0.6,sz*0.06);ctx.lineCap='round';ctx.lineJoin='round';
  const s=sz*0.6,numMap={10:'1',6:'2',7:'3',11:'4'};
  switch(idx){
    case 1:case 2:case 5:{const ch=idx===1?'B':idx===2?'C':'A';ctx.font=`600 ${sz*1.1}px Georgia,serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ch,cx,cy+sz*0.03);}break;
    case 6:case 7:case 10:case 11:{ctx.font=`700 ${sz*1.15}px Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(numMap[idx],cx,cy+sz*0.04);}break;
    case 3:ctx.beginPath();ctx.moveTo(cx-s*.5,cy);ctx.lineTo(cx+s*.5,cy);ctx.moveTo(cx,cy-s*.5);ctx.lineTo(cx,cy+s*.5);ctx.stroke();break;
    case 4:ctx.beginPath();ctx.moveTo(cx-s*.4,cy-s*.16);ctx.lineTo(cx+s*.4,cy-s*.16);ctx.moveTo(cx-s*.4,cy+s*.16);ctx.lineTo(cx+s*.4,cy+s*.16);ctx.stroke();break;
    case 8:ctx.beginPath();ctx.moveTo(cx-s*.4,cy);ctx.lineTo(cx+s*.4,cy);ctx.stroke();break;
    case 9:{const h=s*.3;ctx.strokeRect(cx-h,cy-h,h*2,h*2);}break;
    case 12:ctx.beginPath();ctx.arc(cx,cy,s*.38,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,1.5,0,Math.PI*2);ctx.fill();break;
    case 13:ctx.beginPath();ctx.arc(cx,cy,s*.38,0,Math.PI*2);ctx.stroke();break;
    case 14:{const r=s*.4;ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*.87,cy+r*.5);ctx.lineTo(cx-r*.87,cy+r*.5);ctx.closePath();ctx.stroke();}break;
    case 15:{const or_=s*.42,ir_=or_*.38;ctx.beginPath();for(let i=0;i<10;i++){const ang=-Math.PI/2+i*Math.PI/5,r=i%2?ir_:or_;ctx[i?'lineTo':'moveTo'](cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);}ctx.closePath();ctx.stroke();}break;
    case 16:{const mr=s*.38,off=mr*.4,ir=mr*.75;const xi=(ir*ir-mr*mr-off*off)/(2*off),yi2=mr*mr-xi*xi;if(yi2>0){const yi=Math.sqrt(yi2);ctx.beginPath();ctx.arc(cx,cy,mr,Math.atan2(-yi,xi),Math.atan2(yi,xi),false);ctx.arc(cx-off,cy,ir,Math.atan2(yi,xi+off),Math.atan2(-yi,xi+off),true);ctx.closePath();ctx.fill();}}break;
  }
  ctx.restore();
}

// ─── State machine ───
function advanceStep(fi,now){
  const seq=SEQUENCES[fi],st=states[fi];
  st.step++;
  if(st.step>=seq.cells.length-1){st.phase='fadeout';st.pt=now;}
  else{st.phase='hold';st.pt=now;}
}
function updatePhase(fi,now){
  const seq=SEQUENCES[fi],st=states[fi],el=now-st.pt;
  st.glow.fill(0);
  if(st.phase==='fadeout'){const t=Math.min(1,el/FADEOUT_T);st.lineOpacity=1-ease(t);st.glow[seq.cells[st.step]-1]=(1-t)*0.6;if(t>=1){st.phase='pause';st.pt=now;st.lineOpacity=1;}}
  else if(st.phase==='pause'){if(el>=PAUSE_T){st.step=0;st.phase='fadein';st.pt=now;st.lineOpacity=1;}}
  else if(st.phase==='fadein'){const cur=seq.cells[st.step],t=Math.min(1,el/300);st.glow[cur-1]=ease(t);if(t>=1){st.phase='hold';st.pt=now;}}
  else if(st.phase==='hold'){const cur=seq.cells[st.step];st.glow[cur-1]=0.9+0.1*Math.cos(el*.005);if(el>=HOLD_T){const nxt=seq.cells[st.step+1];if(cur===nxt){st.phase='pulse';st.pt=now;}else{st.phase='flow';st.pt=now;}}}
  else if(st.phase==='pulse'){const cur=seq.cells[st.step],t=Math.min(1,el/PULSE_T);st.glow[cur-1]=0.5+0.5*Math.sin(t*Math.PI);if(t>=1)advanceStep(fi,now);}
  else if(st.phase==='flow'){const cur=seq.cells[st.step],nxt=seq.cells[st.step+1],t=Math.min(1,el/MOVE_T);st.glow[cur-1]=Math.max(0,1-t*1.6);if(t>.55)st.glow[nxt-1]=ease((t-.55)/.45);if(t>=1)advanceStep(fi,now);}
}

// ─── Wheel geometry ───
// 12 outer cells → outer ring.  4 inner cells → central cluster
const OUTER=[1,2,3,4,8,12,16,15,14,13,9,5];
const STAR_PATH=[0,5,10,3,8,1,6,11,4,9,2,7];
const WR=()=>S*0.41; // wheel radius

function cellWheelPos(cellIdx){
  const outerIdx=OUTER.indexOf(cellIdx);
  if(outerIdx>=0){
    const θ=outerIdx*2*Math.PI/12-Math.PI/2;
    const r=WR();
    return{x:CX+r*Math.cos(θ),y:CY+r*Math.sin(θ)};
  }
  // Inner cluster: 6,7,10,11
  const d=S*0.055;
  const map={10:{dx:0,dy:0},6:{dx:-1,dy:-1},7:{dx:1,dy:-1},11:{dx:1,dy:1}};
  const p=map[cellIdx]||{dx:0,dy:0};
  return{x:CX+p.dx*d,y:CY+p.dy*d};
}

// Current active cell (smooth)
function getCurCell(fi){
  const st=states[fi],seq=SEQUENCES[fi];
  if(st.phase==='flow'){
    const t=Math.min(1,(NOW-st.pt)/MOVE_T);
    return t>0.55?seq.cells[st.step+1]:seq.cells[st.step];
  }
  return seq.cells[st.step]||10;
}

// Voice history: last 7 cells per sequence
const voiceHistory=Array.from({length:12},()=>[10,10,10,10,10,10,10]);
const voiceLastCell=new Array(12).fill(10);

function updateHistory(){
  for(let fi=0;fi<12;fi++){
    if(states[fi].phase==='waiting')continue;
    const c=getCurCell(fi);
    if(c!==voiceLastCell[fi]){
      voiceHistory[fi].push(c);
      if(voiceHistory[fi].length>7)voiceHistory[fi].shift();
      voiceLastCell[fi]=c;
    }
  }
}

// ─── Draw wheel skeleton ───
function drawWheelSkeleton(){
  const wr=WR();
  // Outer ring
  ctx.save();
  ctx.strokeStyle='rgba(80,110,200,0.12)';
  ctx.lineWidth=0.7;
  ctx.beginPath();ctx.arc(CX,CY,wr,0,Math.PI*2);ctx.stroke();
  // {12/5} dodecagram
  ctx.strokeStyle='rgba(80,110,200,0.07)';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  for(let k=0;k<12;k++){
    const a=STAR_PATH[k]*2*Math.PI/12-Math.PI/2;
    const b=STAR_PATH[(k+1)%12]*2*Math.PI/12-Math.PI/2;
    const ax=CX+wr*Math.cos(a),ay=CY+wr*Math.sin(a);
    const bx=CX+wr*Math.cos(b),by=CY+wr*Math.sin(b);
    if(k===0)ctx.moveTo(ax,ay);else ctx.lineTo(ax,ay);
    ctx.lineTo(bx,by);
  }
  ctx.stroke();
  // Cell symbols at outer positions
  for(let k=0;k<12;k++){
    const cellIdx=OUTER[k];
    const θ=k*2*Math.PI/12-Math.PI/2;
    const lx=CX+(wr+S*0.045)*Math.cos(θ),ly=CY+(wr+S*0.045)*Math.sin(θ);
    drawSym(cellIdx-1,lx,ly,S*0.019,0.25);
  }
  // Inner cluster labels
  const d=S*0.055;
  [[10,0,0],[6,-1,-1],[7,1,-1],[11,1,1]].forEach(([c,dx,dy])=>{
    drawSym(c-1,CX+dx*d,CY+dy*d,S*0.018,0.18);
  });
  ctx.restore();
}

// ─── Draw voice arcs (history trails) ───
function drawVoiceArcs(){
  for(let fi=0;fi<12;fi++){
    if(states[fi].phase==='waiting')continue;
    const seq=SEQUENCES[fi];
    const hist=voiceHistory[fi];
    const[GR,GG,GB]=seq.glow;
    const lop=states[fi].lineOpacity;
    // Draw arcs between consecutive history positions
    for(let h=0;h<hist.length-1;h++){
      const a=cellWheelPos(hist[h]),b=cellWheelPos(hist[h+1]);
      const age=hist.length-1-h; // 0=most recent
      const alpha=Math.max(0.02,(0.55-age*0.07)*lop);
      const lw=Math.max(0.3,1.5-age*0.2);
      // Control point: slight inward curve
      const cpx=(a.x+b.x)*0.5*0.5+CX*0.5;
      const cpy=(a.y+b.y)*0.5*0.5+CY*0.5;
      ctx.save();
      ctx.strokeStyle=`rgba(${GR},${GG},${GB},${alpha})`;
      ctx.lineWidth=lw;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cpx,cpy,b.x,b.y);ctx.stroke();
      ctx.restore();
    }
  }
}

// ─── Draw current dots on wheel ───
function drawVoiceDots(){
  // Collect dots by cell (to detect confluence)
  const cellDots={}; // cellIdx → [{fi, pos, glow}]
  for(let fi=0;fi<12;fi++){
    if(states[fi].phase==='waiting')continue;
    const curG=states[fi].glow.reduce((mx,v)=>Math.max(mx,v),0);
    if(curG<0.01)continue;
    const c=getCurCell(fi);
    const pos=cellWheelPos(c);
    if(!cellDots[c])cellDots[c]=[];
    cellDots[c].push({fi,pos,glow:curG});
  }
  // For each cell position with dots: draw individual dots (spread slightly if multiple)
  for(const[cellIdx,dots] of Object.entries(cellDots)){
    const n=dots.length;
    dots.forEach((d,k)=>{
      const seq=SEQUENCES[d.fi];
      const[GR,GG,GB]=seq.glow;
      const[CR,CG,CB]=seq.core;
      const lop=states[d.fi].lineOpacity;
      // Spread dots if multiple voices at same cell
      const spreadR=n>1?S*0.013:0;
      const spreadA=k*2*Math.PI/n-Math.PI/2;
      const px=d.pos.x+(n>1?spreadR*Math.cos(spreadA):0);
      const py=d.pos.y+(n>1?spreadR*Math.sin(spreadA):0);
      // Glow
      ctx.save();
      ctx.filter=`blur(${S*0.014}px)`;
      ctx.beginPath();ctx.arc(px,py,S*0.03,0,Math.PI*2);
      ctx.fillStyle=`rgba(${GR},${GG},${GB},${d.glow*0.55*lop})`;
      ctx.fill();ctx.restore();
      // Core
      ctx.beginPath();ctx.arc(px,py,S*0.009,0,Math.PI*2);
      ctx.fillStyle=`rgba(${CR},${CG},${CB},${d.glow*0.92*lop})`;ctx.fill();
    });
    // Confluence glow if multiple voices at same spot
    if(n>1){
      const pos=dots[0].pos;
      ctx.save();
      ctx.filter=`blur(${S*0.022}px)`;
      ctx.beginPath();ctx.arc(pos.x,pos.y,S*0.04*Math.sqrt(n),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${Math.min(0.6,n*0.12)})`;
      ctx.fill();ctx.restore();
    }
  }
}

// ─── Mini 4×4 grid in center ───
function miniGridGeom(){
  const gs=S*0.20,cs=gs/3,bx=cs*0.16;
  const ox=CX-cs*1.5,oy=CY-cs*1.5;
  return{cs,bx,ox,oy};
}
function miniXY(cellIdx){
  const{cs,ox,oy}=miniGridGeom();
  const n=cellIdx-1;
  return{x:ox+(n%4)*cs,y:oy+((n/4)|0)*cs};
}
function drawMiniGrid(){
  const{cs,bx}=miniGridGeom();
  // Cell glows
  for(let ci=1;ci<=16;ci++){
    let maxG=0,r=0,g=0,b=0,w=0;
    for(let fi=0;fi<12;fi++){
      const gv=states[fi].glow[ci-1];
      if(gv<0.01)continue;
      const c=SEQUENCES[fi].glow;
      r+=c[0]*gv;g+=c[1]*gv;b+=c[2]*gv;w+=gv;if(gv>maxG)maxG=gv;
    }
    const pp=miniXY(ci);
    if(maxG>0.01&&w>0){
      const inv=1/w;
      // Radial glow
      const gr=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,bx*3.5);
      gr.addColorStop(0,`rgba(${Math.round(r*inv)},${Math.round(g*inv)},${Math.round(b*inv)},${maxG*0.35})`);
      gr.addColorStop(1,`rgba(0,0,0,0)`);
      ctx.fillStyle=gr;ctx.fillRect(pp.x-bx*3.5,pp.y-bx*3.5,bx*7,bx*7);
    }
    // Cell box
    const boxA=0.07+maxG*0.35;
    ctx.strokeStyle=`rgba(80,100,160,${boxA})`;
    ctx.lineWidth=0.5;ctx.strokeRect(pp.x-bx,pp.y-bx,bx*2,bx*2);
    // Symbol
    drawSym(ci-1,pp.x,pp.y,bx*1.2,0.15+maxG*0.60);
  }
  // Grid lines
  ctx.save();ctx.strokeStyle='rgba(60,80,120,0.08)';ctx.lineWidth=0.4;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const i=r*4+c+1,pp=miniXY(i);
    if(c<3){const n=miniXY(i+1);ctx.beginPath();ctx.moveTo(pp.x+bx,pp.y);ctx.lineTo(n.x-bx,pp.y);ctx.stroke();}
    if(r<3){const n=miniXY(i+4);ctx.beginPath();ctx.moveTo(pp.x,pp.y+bx);ctx.lineTo(pp.x,n.y-bx);ctx.stroke();}
  }
  ctx.restore();
}

// ─── Connecting spokes from wheel dot to mini-grid cell ───
function drawSpokes(){
  for(let fi=0;fi<12;fi++){
    if(states[fi].phase==='waiting')continue;
    const curG=states[fi].glow.reduce((mx,v)=>Math.max(mx,v),0);
    if(curG<0.05)continue;
    const c=getCurCell(fi);
    const wp=cellWheelPos(c);
    const gp=miniXY(c);
    const[GR,GG,GB]=SEQUENCES[fi].glow;
    const lop=states[fi].lineOpacity;
    ctx.save();
    ctx.strokeStyle=`rgba(${GR},${GG},${GB},${curG*0.18*lop})`;
    ctx.lineWidth=0.6;ctx.lineCap='round';ctx.setLineDash([3,6]);
    ctx.beginPath();ctx.moveTo(wp.x,wp.y);ctx.lineTo(gp.x,gp.y);ctx.stroke();
    ctx.restore();
  }
}

// ─── Hub ───
function drawHub(now){
  const pulse=0.5+0.5*Math.sin(now*0.0025);
  ctx.save();
  ctx.filter=`blur(${S*0.016}px)`;
  ctx.beginPath();ctx.arc(CX,CY,S*0.032+pulse*S*0.006,0,Math.PI*2);
  ctx.fillStyle='rgba(255,200,80,0.3)';ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(CX,CY,S*0.030,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,200,80,0.88)';ctx.lineWidth=1.3;ctx.stroke();
  drawSym(9,CX,CY,S*0.022,0.9);
}

// ─── Legend dots (outer) ───
function drawLegend(){
  const lr=WR()+S*0.078;
  for(let fi=0;fi<12;fi++){
    if(states[fi].phase==='waiting')continue;
    const θ=fi*2*Math.PI/12-Math.PI/2;
    const x=CX+lr*Math.cos(θ),y=CY+lr*Math.sin(θ);
    const act=states[fi].glow.reduce((mx,v)=>Math.max(mx,v),0);
    const[R,G,B]=SEQUENCES[fi].glow;
    ctx.beginPath();ctx.arc(x,y,S*0.006,0,Math.PI*2);
    ctx.fillStyle=`rgba(${R},${G},${B},${0.18+act*0.72})`;ctx.fill();
  }
}

// ─── Loop ───
function loop(now){
  if(!T0)T0=now; NOW=now;
  ctx.fillStyle='#060610';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(CX,CY,S*0.05,CX,CY,S*0.58);
  vg.addColorStop(0,'rgba(8,6,22,0.1)');vg.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  // Activate
  for(let i=0;i<12;i++){
    if(states[i].phase==='waiting'&&now-T0>=START_OFFS[i]){states[i].phase='fadein';states[i].pt=now;}
  }
  for(let fi=0;fi<12;fi++){if(states[fi].phase!=='waiting')updatePhase(fi,now);}
  updateHistory();
  // Layers
  drawWheelSkeleton();
  drawVoiceArcs();
  drawSpokes();
  drawMiniGrid();
  drawVoiceDots();
  drawHub(now);
  drawLegend();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
