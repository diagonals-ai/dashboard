<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espanso 12 – Connection Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

let W, H, S, CX, CY;
function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
  S = Math.min(W, H) * 0.94;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

// ─── 12 Sequences ───
const SEQUENCES = [
  { cells:[10,6,7,11,10], hue:[30,140,255], glow:[50,180,255], particle:[120,220,255], core:[220,245,255] },
  { cells:[10,6,10,7,11,6,10,9,10,14,10], hue:[255,140,30], glow:[255,180,50], particle:[255,200,80], core:[255,240,200] },
  { cells:[10,13,10,6,7,3,4,8,7,11,6,1,2,5,6,10,11,12,16,15,10], hue:[255,220,30], glow:[255,240,60], particle:[255,245,120], core:[255,255,220] },
  { cells:[10,6,7,11,10,7,6,11,7,3,6,5,1,2,6,10,14,13,10,7,4,8,12,16,11,10,10], hue:[30,220,80], glow:[60,255,100], particle:[100,255,140], core:[210,255,220] },
  { cells:[10,7,6,11,10,7,4,3,8,7,10,6,2,3,7,12,11,15,16,11,12,8,3,4,3,2,7,6,10], hue:[140,50,255], glow:[160,80,255], particle:[190,140,255], core:[230,215,255] },
  { cells:[10,7,4,3,8,7,2,1,5,6,3,2,7,11,10,15,14,9,10], hue:[255,40,160], glow:[255,70,180], particle:[255,130,210], core:[255,215,240] },
  { cells:[10,5,2,3,8,11,12,15,16,11,6,1,5,9,13,14,9,10,5,6,7,8,4,7,3,2,6,10], hue:[0,210,230], glow:[30,235,250], particle:[100,250,255], core:[200,255,255] },
  { cells:[10,6,2,2,2,3,3,2,1,1,1,5,6,7,4,8,7,12,15,11,11,11,6,11,6,11,7,8,11,12,15,11,10], hue:[255,50,50], glow:[255,80,70], particle:[255,140,120], core:[255,220,210] },
  { cells:[10,6,2,1,5,9,13,14,15,16,12,8,4,3,7,10,13,9,5,1,6,6,3,2,1,5,10,11,15,16,11,6,1,2,6,3,6,11,15,14,11,6,9,5,2,7,4,8,12,15,10,10,10], hue:[255,110,150], glow:[255,140,170], particle:[255,180,200], core:[255,230,240] },
  { cells:[10,11,6,7,10,11,6,7,4,8,3,7,2,6,1,5,9,14,13,10,9,10,10,11,15,16,12,11,16,15,12,11,10,7,4,3,2,1,6,11,14,13,10,7,8,12,11,10,9,5,6,10], hue:[0,190,160], glow:[30,220,190], particle:[90,245,225], core:[200,255,248] },
  { cells:[10,9,5,1,6,7,4,3,2,7,12,11,10,9,5,1,6,3,2,7,4,8,11,15,14,11,10,15,14,11,6,3,7,10,13,14,10,11,15,10], hue:[160,255,30], glow:[180,255,65], particle:[210,255,130], core:[235,255,215] },
  { cells:[10,7,4,3,8,7,2,6,3,2,1,6,5,9,10,13,14,11,15,10], hue:[180,190,255], glow:[200,210,255], particle:[220,225,255], core:[245,248,255] }
];

// ─── Timing ───
const HOLD_T=600, MOVE_T=500, PULSE_T=500, PAUSE_T=800, FADEOUT_T=600;

// ─── Staggered start offsets (ms) ───
const START_OFFS = Array.from({length:12}, (_,i) => i * 480);
let T0 = null, NOW = 0;

// ─── State ───
function makeState() {
  return { step:0, phase:'waiting', pt:0, trail:[], glow:new Float32Array(16),
           pathSegments:[], lineOpacity:1, fc:0 };
}
const states = Array.from({length:12}, makeState);

// ─── Shared cells matrix (excluding cell 10) ───
const cellSets = SEQUENCES.map(s => new Set(s.cells.filter(c => c !== 10)));
const SHARED = Array.from({length:12}, () => new Array(12).fill(0));
let maxSh = 1;
for (let i=0; i<12; i++) {
  for (let j=i+1; j<12; j++) {
    let cnt=0;
    for (const c of cellSets[i]) if (cellSets[j].has(c)) cnt++;
    SHARED[i][j] = SHARED[j][i] = cnt;
    if (cnt > maxSh) maxSh = cnt;
  }
}

// ─── Node position ───  (0 at top, clockwise)
function npos(i) {
  const a = i * 2*Math.PI/12 - Math.PI/2;
  const r = S * 0.395;
  return { x: CX + r*Math.cos(a), y: CY + r*Math.sin(a) };
}

// ─── Bezier control point (pulls edge inward toward centre) ───
function ecp(pi, pj) {
  const mx=(pi.x+pj.x)*0.5, my=(pi.y+pj.y)*0.5;
  return { x: mx*0.32 + CX*0.68, y: my*0.32 + CY*0.68 };
}

// ─── Current cell for resonance detection ───
function curCell(fi) {
  const st = states[fi], cells = SEQUENCES[fi].cells;
  const step = Math.min(st.step, cells.length-1);
  if (st.phase==='waiting'||st.phase==='pause'||st.phase==='fadeout') return 10;
  if (st.phase==='flow') {
    const t = Math.min(1, (NOW - st.pt)/MOVE_T);
    return t > 0.5 ? cells[Math.min(step+1, cells.length-1)] : cells[step];
  }
  return cells[step];
}

// ─── drawSym (identical to v2) ───
function drawSym(idx, cx, cy, sz, a) {
  ctx.save();
  const col = `rgba(180,200,230,${a})`;
  ctx.fillStyle = col; ctx.strokeStyle = col;
  ctx.lineWidth = Math.max(0.6, sz*0.06);
  ctx.lineCap='round'; ctx.lineJoin='round';
  const s = sz*0.6;
  const numMap = {10:'1', 6:'2', 7:'3', 11:'4'};
  switch(idx) {
    case 1: case 2: case 5: {
      const ch = idx===1?'B':idx===2?'C':'A';
      ctx.font=`600 ${sz*1.1}px Georgia,serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(ch, cx, cy+sz*0.03);
    } break;
    case 6: case 7: case 10: case 11: {
      ctx.font=`700 ${sz*1.15}px Arial,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(numMap[idx], cx, cy+sz*0.04);
    } break;
    case 3:
      ctx.beginPath(); ctx.moveTo(cx-s*.5,cy); ctx.lineTo(cx+s*.5,cy);
      ctx.moveTo(cx,cy-s*.5); ctx.lineTo(cx,cy+s*.5); ctx.stroke(); break;
    case 4:
      ctx.beginPath(); ctx.moveTo(cx-s*.4,cy-s*.16); ctx.lineTo(cx+s*.4,cy-s*.16);
      ctx.moveTo(cx-s*.4,cy+s*.16); ctx.lineTo(cx+s*.4,cy+s*.16); ctx.stroke(); break;
    case 8:
      ctx.beginPath(); ctx.moveTo(cx-s*.4,cy); ctx.lineTo(cx+s*.4,cy); ctx.stroke(); break;
    case 9: { const h=s*.3; ctx.strokeRect(cx-h,cy-h,h*2,h*2); } break;
    case 12:
      ctx.beginPath(); ctx.arc(cx,cy,s*.38,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,1.5,0,Math.PI*2); ctx.fill(); break;
    case 13:
      ctx.beginPath(); ctx.arc(cx,cy,s*.38,0,Math.PI*2); ctx.stroke(); break;
    case 14: {
      const r=s*.4; ctx.beginPath(); ctx.moveTo(cx,cy-r);
      ctx.lineTo(cx+r*.87,cy+r*.5); ctx.lineTo(cx-r*.87,cy+r*.5);
      ctx.closePath(); ctx.stroke();
    } break;
    case 15: {
      const or_=s*.42, ir_=or_*.38; ctx.beginPath();
      for(let i=0;i<10;i++){
        const ang=-Math.PI/2+i*Math.PI/5; const r=i%2?ir_:or_;
        ctx[i?'lineTo':'moveTo'](cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
      }
      ctx.closePath(); ctx.stroke();
    } break;
    case 16: {
      const mr=s*.38, off=mr*.4, ir=mr*.75;
      const xi=(ir*ir-mr*mr-off*off)/(2*off), yi2=mr*mr-xi*xi;
      if(yi2>0){ const yi=Math.sqrt(yi2); ctx.beginPath();
        ctx.arc(cx,cy,mr,Math.atan2(-yi,xi),Math.atan2(yi,xi),false);
        ctx.arc(cx-off,cy,ir,Math.atan2(yi,xi+off),Math.atan2(-yi,xi+off),true);
        ctx.closePath(); ctx.fill(); }
    } break;
  }
  ctx.restore();
}

// ─── advanceStep ───
function advanceStep(fi, now) {
  const seq=SEQUENCES[fi], st=states[fi];
  const from=seq.cells[st.step], to=seq.cells[st.step+1];
  if (from !== to) st.pathSegments.push({ from, to });
  st.step++;
  if (st.step >= seq.cells.length-1) { st.phase='fadeout'; st.pt=now; st.trail=[]; }
  else { st.phase='hold'; st.pt=now; }
}

// ─── renderMiniGrid ───
function renderMiniGrid(fi, now) {
  const seq=SEQUENCES[fi], st=states[fi];
  if (st.phase==='waiting') return;

  const p = npos(fi);
  const gs = S*0.115, cs = gs/3, bx = cs*0.16;
  const ox = p.x - cs*1.5, oy = p.y - cs*1.5;

  function xyL(i) {
    const n=i-1;
    return { x: ox+(n%4)*cs, y: oy+((n/4)|0)*cs };
  }

  const el = now - st.pt;
  st.glow.fill(0);
  let particle = null;

  // ── Phase logic ──
  if (st.phase==='fadeout') {
    const t=Math.min(1, el/FADEOUT_T);
    st.lineOpacity = 1-ease(t);
    st.glow[seq.cells[st.step]-1] = (1-t)*0.6;
    if (t>=1) { st.phase='pause'; st.pt=now; st.pathSegments=[]; st.lineOpacity=1; }
  }
  else if (st.phase==='pause') {
    if (el>=PAUSE_T) { st.step=0; st.phase='fadein'; st.pt=now; st.pathSegments=[]; st.lineOpacity=1; st.trail=[]; }
  }
  else if (st.phase==='fadein') {
    const cur=seq.cells[st.step], t=Math.min(1, el/300);
    st.glow[cur-1]=ease(t);
    if (t>=1) { st.phase='hold'; st.pt=now; }
  }
  else if (st.phase==='hold') {
    const cur=seq.cells[st.step];
    st.glow[cur-1]=0.9+0.1*Math.cos(el*.005);
    if (el>=HOLD_T) {
      const nxt=seq.cells[st.step+1];
      if (cur===nxt) { st.phase='pulse'; st.pt=now; }
      else { st.phase='flow'; st.pt=now; st.trail=[]; }
    }
  }
  else if (st.phase==='pulse') {
    const cur=seq.cells[st.step], t=Math.min(1, el/PULSE_T);
    st.glow[cur-1]=0.5+0.5*Math.sin(t*Math.PI);
    if (t>=1) advanceStep(fi, now);
  }
  else if (st.phase==='flow') {
    const cur=seq.cells[st.step], nxt=seq.cells[st.step+1];
    const t=Math.min(1, el/MOVE_T);
    st.glow[cur-1]=Math.max(0, 1-t*1.6);
    if (t>.55) st.glow[nxt-1]=ease((t-.55)/.45);
    const a=xyL(cur), b=xyL(nxt), et=ease(t);
    particle={ x: a.x+(b.x-a.x)*et, y: a.y+(b.y-a.y)*et };
    if (st.fc%2===0) { st.trail.unshift({...particle}); if (st.trail.length>10) st.trail.pop(); }
    if (t>=1) { st.trail=[]; particle=null; advanceStep(fi, now); }
  }

  // ── Dark radial backdrop ──
  const bgr = gs*0.75;
  const bgGrad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,bgr);
  bgGrad.addColorStop(0, 'rgba(6,6,16,0.92)');
  bgGrad.addColorStop(0.65, 'rgba(6,6,16,0.75)');
  bgGrad.addColorStop(1, 'rgba(6,6,16,0)');
  ctx.fillStyle=bgGrad;
  ctx.beginPath(); ctx.arc(p.x,p.y,bgr,0,Math.PI*2); ctx.fill();

  // ── Grid connectors ──
  ctx.save();
  ctx.strokeStyle='rgba(60,80,120,0.07)';
  ctx.lineWidth=0.5;
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const i=r*4+c+1, pp=xyL(i);
    if (c<3) { const n=xyL(i+1); ctx.beginPath(); ctx.moveTo(pp.x+bx,pp.y); ctx.lineTo(n.x-bx,pp.y); ctx.stroke(); }
    if (r<3) { const n=xyL(i+4); ctx.beginPath(); ctx.moveTo(pp.x,pp.y+bx); ctx.lineTo(pp.x,n.y-bx); ctx.stroke(); }
  }
  ctx.restore();

  // ── Persistent path lines ──
  if (st.pathSegments.length > 0) {
    ctx.save(); ctx.lineCap='round';
    for (let i=0; i<st.pathSegments.length; i++) {
      const sg=st.pathSegments[i];
      const a=xyL(sg.from), b=xyL(sg.to);
      const age=1-i/(st.pathSegments.length+5);
      const alpha=st.lineOpacity*(0.3+0.4*age);
      ctx.strokeStyle=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${alpha*0.3})`;
      ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.strokeStyle=`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${alpha})`;
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Active flow segment ──
  if (st.phase==='flow') {
    const cur=seq.cells[st.step], nxt=seq.cells[st.step+1];
    if (cur!==nxt) {
      const t=Math.min(1,el/MOVE_T), a=xyL(cur), b=xyL(nxt), et=ease(t);
      const ex=a.x+(b.x-a.x)*et, ey=a.y+(b.y-a.y)*et;
      ctx.save(); ctx.lineCap='round';
      ctx.strokeStyle=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${st.lineOpacity*0.2})`;
      ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.strokeStyle=`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${st.lineOpacity*0.5})`;
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.restore();
    }
  }

  // ── Cells ──
  for (let i=1; i<=16; i++) {
    const pp=xyL(i), g=st.glow[i-1];
    ctx.save();
    if (g>.03) {
      const gr=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,bx*3.5);
      gr.addColorStop(0,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},${g*.15})`);
      gr.addColorStop(1,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0)`);
      ctx.fillStyle=gr; ctx.fillRect(pp.x-bx*3.5,pp.y-bx*3.5,bx*7,bx*7);
      ctx.shadowColor=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${g*.7})`;
      ctx.shadowBlur=12*g;
    }
    const a=.25+g*.75;
    ctx.strokeStyle=g>.08?`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${a})`:`rgba(140,160,190,${a})`;
    ctx.lineWidth=Math.max(0.5, 0.8+g*.4);
    ctx.strokeRect(pp.x-bx,pp.y-bx,bx*2,bx*2);
    ctx.shadowBlur=0;
    drawSym(i, pp.x, pp.y, bx*.85, a);
    ctx.restore();
  }

  // ── Trail ──
  if (st.trail.length && st.phase==='flow') {
    const tr=bx*0.7;
    for (let i=0;i<st.trail.length;i++) {
      const t=1-i/st.trail.length, tp=st.trail[i];
      ctx.save();
      const gr=ctx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,tr*t);
      gr.addColorStop(0,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},${t*.4})`);
      gr.addColorStop(1,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},0)`);
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(tp.x,tp.y,tr*t,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── Particle ──
  if (particle) {
    ctx.save();
    const pr=bx*1.4;
    const gr=ctx.createRadialGradient(particle.x,particle.y,0,particle.x,particle.y,pr);
    gr.addColorStop(0,`rgba(${seq.particle[0]},${seq.particle[1]},${seq.particle[2]},0.85)`);
    gr.addColorStop(.3,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0.3)`);
    gr.addColorStop(1,`rgba(${seq.hue[0]},${seq.hue[1]},${seq.hue[2]},0)`);
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(particle.x,particle.y,pr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(${seq.core[0]},${seq.core[1]},${seq.core[2]},0.9)`;
    ctx.beginPath(); ctx.arc(particle.x,particle.y,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Node ring ──
  const actMax = Math.max(...st.glow);
  const nodeR = gs * 0.62;
  ctx.save();
  ctx.strokeStyle=`rgba(${seq.glow[0]},${seq.glow[1]},${seq.glow[2]},${0.12+0.45*actMax})`;
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(p.x,p.y,nodeR,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  st.fc++;
}

// ─── drawEdges ───
function drawEdges(now) {
  const resonant = [];

  for (let i=0; i<12; i++) {
    for (let j=i+1; j<12; j++) {
      const sh = SHARED[i][j];
      if (!sh) continue;

      const pi=npos(i), pj=npos(j), cp=ecp(pi,pj);
      const colI=SEQUENCES[i].glow, colJ=SEQUENCES[j].glow;
      const ci=curCell(i), cj=curCell(j);
      const isRes = (ci===cj && ci!==10);

      if (isRes) { resonant.push({i,j,pi,pj,cp,colI,colJ,cell:ci}); }

      // ── Static edge ──
      const alpha = 0.013 + 0.095*(sh/maxSh);
      const lw    = 0.2  + 1.6*(sh/maxSh);
      const grad  = ctx.createLinearGradient(pi.x,pi.y,pj.x,pj.y);
      grad.addColorStop(0, `rgba(${colI[0]},${colI[1]},${colI[2]},${alpha})`);
      grad.addColorStop(1, `rgba(${colJ[0]},${colJ[1]},${colJ[2]},${alpha})`);
      ctx.strokeStyle=grad; ctx.lineWidth=lw;
      ctx.beginPath(); ctx.moveTo(pi.x,pi.y); ctx.quadraticCurveTo(cp.x,cp.y,pj.x,pj.y); ctx.stroke();
    }
  }

  // ── Resonant edges on top ──
  for (const r of resonant) {
    const {pi,pj,cp,colI,colJ} = r;
    const pulse = 0.5 + 0.5*Math.sin(now*0.006);
    const alpha = 0.55 + 0.35*pulse;

    // Glow layer
    ctx.save();
    ctx.filter='blur(7px)';
    const g1=ctx.createLinearGradient(pi.x,pi.y,pj.x,pj.y);
    g1.addColorStop(0,`rgba(${colI[0]},${colI[1]},${colI[2]},${alpha*0.55})`);
    g1.addColorStop(1,`rgba(${colJ[0]},${colJ[1]},${colJ[2]},${alpha*0.55})`);
    ctx.strokeStyle=g1; ctx.lineWidth=9;
    ctx.beginPath(); ctx.moveTo(pi.x,pi.y); ctx.quadraticCurveTo(cp.x,cp.y,pj.x,pj.y); ctx.stroke();
    ctx.restore();

    // Sharp core
    ctx.save();
    const g2=ctx.createLinearGradient(pi.x,pi.y,pj.x,pj.y);
    g2.addColorStop(0,`rgba(${colI[0]},${colI[1]},${colI[2]},${alpha})`);
    g2.addColorStop(1,`rgba(${colJ[0]},${colJ[1]},${colJ[2]},${alpha})`);
    ctx.strokeStyle=g2; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(pi.x,pi.y); ctx.quadraticCurveTo(cp.x,cp.y,pj.x,pj.y); ctx.stroke();
    ctx.restore();

    // Midpoint dot: shows the shared cell symbol
    const t=0.5;
    const mx=(1-t)*(1-t)*pi.x + 2*(1-t)*t*cp.x + t*t*pj.x;
    const my=(1-t)*(1-t)*pi.y + 2*(1-t)*t*cp.y + t*t*pj.y;
    const br=Math.round((colI[0]+colJ[0])/2);
    const bg=Math.round((colI[1]+colJ[1])/2);
    const bb=Math.round((colI[2]+colJ[2])/2);
    const ssz = S*0.011;
    ctx.save();
    // Dot backdrop
    ctx.fillStyle=`rgba(6,6,16,0.85)`;
    ctx.beginPath(); ctx.arc(mx,my,ssz*1.7,0,Math.PI*2); ctx.fill();
    // Dot ring
    ctx.strokeStyle=`rgba(${br},${bg},${bb},${alpha})`;
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(mx,my,ssz*1.7,0,Math.PI*2); ctx.stroke();
    // Cell symbol
    const symCol = `rgba(${br},${bg},${bb},${alpha})`;
    ctx.fillStyle=symCol; ctx.strokeStyle=symCol;
    ctx.lineWidth=Math.max(0.5,ssz*0.06); ctx.lineCap='round'; ctx.lineJoin='round';
    drawSym(r.cell, mx, my, ssz, alpha);
    ctx.restore();
  }

  return resonant.length;
}

// ─── drawCenter ───
function drawCenter(now, resCount) {
  const r = S*0.052;
  const pulse = 0.5+0.5*Math.sin(now*0.0022);

  // Outer node circle (barely visible)
  ctx.save();
  ctx.strokeStyle='rgba(100,120,160,0.07)';
  ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.arc(CX,CY,S*0.395,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Resonance glow behind hub
  if (resCount > 0) {
    ctx.save();
    ctx.filter='blur(28px)';
    const gv = Math.min(1, resCount*0.08);
    ctx.fillStyle=`rgba(255,210,80,${(0.06+0.16*gv)*pulse})`;
    ctx.beginPath(); ctx.arc(CX,CY,r*3.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Hub ring inner fill
  const fill=ctx.createRadialGradient(CX,CY,0,CX,CY,r);
  fill.addColorStop(0,`rgba(40,30,10,${0.8*pulse})`);
  fill.addColorStop(1,'rgba(6,6,16,0)');
  ctx.fillStyle=fill;
  ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.fill();

  // Hub ring stroke (double — glow + core)
  ctx.save();
  ctx.filter='blur(4px)';
  ctx.strokeStyle=`rgba(200,170,60,${0.35*pulse})`;
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle=`rgba(220,190,80,${0.3+0.45*pulse})`;
  ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // "1" symbol
  drawSym(10, CX, CY, r*0.65, 0.45+0.4*pulse);

  // Resonance count label
  if (resCount > 0) {
    ctx.save();
    ctx.fillStyle=`rgba(255,220,100,${0.55*pulse+0.1})`;
    ctx.font=`${S*0.012}px Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`${resCount} risonanz${resCount===1?'a':'e'}`, CX, CY+r*1.85);
    ctx.restore();
  }
}

// ─── Main loop ───
function loop(now) {
  if (!T0) T0 = now;
  NOW = now;

  // Background
  ctx.fillStyle='#060610';
  ctx.fillRect(0, 0, W, H);

  // Soft radial vignette
  const vg = ctx.createRadialGradient(CX,CY,0,CX,CY,S*0.52);
  vg.addColorStop(0,'rgba(12,10,30,0.25)');
  vg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Activate staggered sequences
  for (let i=0; i<12; i++) {
    if (states[i].phase==='waiting' && now-T0 >= START_OFFS[i]) {
      states[i].phase='fadein';
      states[i].pt=now;
    }
  }

  // Edges (drawn before nodes so nodes appear on top)
  const resCount = drawEdges(now);

  // Centre hub
  drawCenter(now, resCount);

  // Mini-grids
  for (let i=0; i<12; i++) {
    renderMiniGrid(i, now);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
