<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Sequence Animation вҖ“ 12 Sequenze</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

// в”Җв”Җв”Җ Sizing в”Җв”Җв”Җ
let W, H, CELL, BOX, OX, OY;
function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
  const g = Math.min(W, H) * 0.82;
  CELL = g / 3;
  BOX = CELL * 0.16;
  OX = (W - g) / 2;
  OY = (H - g) / 2;
}
resize();
window.addEventListener('resize', resize);

// в”Җв”Җв”Җ Helpers в”Җв”Җв”Җ
function xy(i) {
  const n = i - 1;
  const col = n % 4, row = (n / 4) | 0;
  return { x: OX + col * CELL, y: OY + row * CELL };
}
function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

function lerpDirect(from, to, t) {
  const a = xy(from), b = xy(to);
  const et = ease(t);
  return { x: a.x + (b.x - a.x) * et, y: a.y + (b.y - a.y) * et };
}

// в”Җв”Җв”Җ 12 Sequences в”Җв”Җв”Җ
// Cell mapping:
//   Row 0:  B=cell1   C=cell2   +=cell3   ==cell4
//   Row 1:  A=cell5   2=cell6   3=cell7   -=cell8
//   Row 2:  в–Ў=cell9   1=cell10  4=cell11  вҠҷ=cell12
//   Row 3:  в—Ӣ=cell13  в–і=cell14  вҳҶ=cell15  рҹҢҷ=cell16
//
// User numbers: 1=cell10, 2=cell6, 3=cell7, 4/quattro=cell11

const SEQUENCES = [
  {
    // Seq 1 (Blue): 1вҶ’2вҶ’3вҶ’4вҶ’1
    cells: [10, 6, 7, 11, 10],
    hue: [30,140,255], glow: [50,180,255], particle: [120,220,255], core: [220,245,255]
  },
  {
    // Seq 2 (Orange): 1вҶ’2вҶ’1вҶ’3вҶ’4вҶ’2вҶ’1вҶ’в–ЎвҶ’1вҶ’в–івҶ’1
    cells: [10, 6, 10, 7, 11, 6, 10, 9, 10, 14, 10],
    hue: [255,140,30], glow: [255,180,50], particle: [255,200,80], core: [255,240,200]
  },
  {
    // Seq 3 (Yellow): 1вҶ’в—ӢвҶ’1вҶ’2вҶ’3вҶ’+вҶ’=вҶ’вҲ’вҶ’3вҶ’4вҶ’2вҶ’BвҶ’CвҶ’AвҶ’2вҶ’1вҶ’4вҶ’вҠҷвҶ’рҹҢҷвҶ’вҳҶвҶ’1
    cells: [10, 13, 10, 6, 7, 3, 4, 8, 7, 11, 6, 1, 2, 5, 6, 10, 11, 12, 16, 15, 10],
    hue: [255,220,30], glow: [255,240,60], particle: [255,245,120], core: [255,255,220]
  },
  {
    // Seq 4 (Green): 1вҶ’2вҶ’3вҶ’4вҶ’1вҶ’3вҶ’2вҶ’4вҶ’3вҶ’+вҶ’2вҶ’AвҶ’BвҶ’CвҶ’2вҶ’1вҶ’в–івҶ’в—ӢвҶ’1вҶ’3вҶ’=вҶ’вҲ’вҶ’вҠҷвҶ’рҹҢҷвҶ’4вҶ’1вҶ’1
    cells: [10, 6, 7, 11, 10, 7, 6, 11, 7, 3, 6, 5, 1, 2, 6, 10, 14, 13, 10, 7, 4, 8, 12, 16, 11, 10, 10],
    hue: [30,220,80], glow: [60,255,100], particle: [100,255,140], core: [210,255,220]
  },
  {
    // Seq 5 (Violet): 1вҶ’3вҶ’2вҶ’4вҶ’1вҶ’3вҶ’=вҶ’+вҶ’вҲ’вҶ’3вҶ’1вҶ’2вҶ’CвҶ’+вҶ’3вҶ’вҠҷвҶ’4вҶ’вҳҶвҶ’рҹҢҷвҶ’4вҶ’вҠҷвҶ’вҲ’вҶ’+вҶ’=вҶ’+вҶ’CвҶ’3вҶ’2вҶ’1
    cells: [10, 7, 6, 11, 10, 7, 4, 3, 8, 7, 10, 6, 2, 3, 7, 12, 11, 15, 16, 11, 12, 8, 3, 4, 3, 2, 7, 6, 10],
    hue: [140,50,255], glow: [160,80,255], particle: [190,140,255], core: [230,215,255]
  },
  {
    // Seq 6 (Magenta): 1вҶ’3вҶ’=вҶ’+вҶ’вҲ’вҶ’3вҶ’CвҶ’BвҶ’AвҶ’2вҶ’+вҶ’CвҶ’3вҶ’4вҶ’1вҶ’вҳҶвҶ’в–івҶ’в–ЎвҶ’1
    cells: [10, 7, 4, 3, 8, 7, 2, 1, 5, 6, 3, 2, 7, 11, 10, 15, 14, 9, 10],
    hue: [255,40,160], glow: [255,70,180], particle: [255,130,210], core: [255,215,240]
  },
  {
    // Seq 7 (Cyan): 1вҶ’AвҶ’CвҶ’+вҶ’вҲ’вҶ’4вҶ’вҠҷвҶ’вҳҶвҶ’рҹҢҷвҶ’4вҶ’2вҶ’BвҶ’AвҶ’в–ЎвҶ’в—ӢвҶ’в–івҶ’в–ЎвҶ’1вҶ’AвҶ’2вҶ’3вҶ’вҲ’вҶ’=вҶ’3вҶ’+вҶ’CвҶ’2вҶ’1
    cells: [10, 5, 2, 3, 8, 11, 12, 15, 16, 11, 6, 1, 5, 9, 13, 14, 9, 10, 5, 6, 7, 8, 4, 7, 3, 2, 6, 10],
    hue: [0,210,230], glow: [30,235,250], particle: [100,250,255], core: [200,255,255]
  },
  {
    // Seq 8 (Red): 1вҶ’2вҶ’CвҶ’CвҶ’CвҶ’+вҶ’+вҶ’CвҶ’BвҶ’BвҶ’BвҶ’AвҶ’2вҶ’3вҶ’=вҶ’вҲ’вҶ’3вҶ’вҠҷвҶ’вҳҶвҶ’4вҶ’4вҶ’4вҶ’2вҶ’4вҶ’2вҶ’4вҶ’3вҶ’вҲ’вҶ’4вҶ’вҠҷвҶ’вҳҶвҶ’4вҶ’1
    cells: [10, 6, 2, 2, 2, 3, 3, 2, 1, 1, 1, 5, 6, 7, 4, 8, 7, 12, 15, 11, 11, 11, 6, 11, 6, 11, 7, 8, 11, 12, 15, 11, 10],
    hue: [255,50,50], glow: [255,80,70], particle: [255,140,120], core: [255,220,210]
  },
  {
    // Seq 9 (Rose): 1вҶ’2вҶ’CвҶ’BвҶ’AвҶ’в–ЎвҶ’в—ӢвҶ’в–івҶ’вҳҶвҶ’рҹҢҷвҶ’вҠҷвҶ’вҲ’вҶ’=вҶ’+вҶ’3вҶ’1вҶ’в—ӢвҶ’в–ЎвҶ’AвҶ’BвҶ’2вҶ’2вҶ’+вҶ’CвҶ’BвҶ’AвҶ’1вҶ’4вҶ’вҳҶвҶ’рҹҢҷвҶ’4вҶ’2вҶ’BвҶ’CвҶ’2вҶ’+вҶ’2вҶ’4вҶ’вҳҶвҶ’в–івҶ’4вҶ’2вҶ’в–ЎвҶ’AвҶ’CвҶ’3вҶ’=вҶ’вҲ’вҶ’вҠҷвҶ’вҳҶвҶ’1вҶ’1вҶ’1
    cells: [10, 6, 2, 1, 5, 9, 13, 14, 15, 16, 12, 8, 4, 3, 7, 10, 13, 9, 5, 1, 6, 6, 3, 2, 1, 5, 10, 11, 15, 16, 11, 6, 1, 2, 6, 3, 6, 11, 15, 14, 11, 6, 9, 5, 2, 7, 4, 8, 12, 15, 10, 10, 10],
    hue: [255,110,150], glow: [255,140,170], particle: [255,180,200], core: [255,230,240]
  },
  {
    // Seq 10 (Teal): 1вҶ’4вҶ’2вҶ’3вҶ’1вҶ’4вҶ’2вҶ’3вҶ’=вҶ’вҲ’вҶ’+вҶ’3вҶ’CвҶ’2вҶ’BвҶ’AвҶ’в–ЎвҶ’в–івҶ’в—ӢвҶ’1вҶ’в–ЎвҶ’1вҶ’1вҶ’4вҶ’вҳҶвҶ’рҹҢҷвҶ’вҠҷвҶ’4вҶ’рҹҢҷвҶ’вҳҶвҶ’вҠҷвҶ’4вҶ’1вҶ’3вҶ’=вҶ’+вҶ’CвҶ’BвҶ’2вҶ’4вҶ’в–івҶ’в—ӢвҶ’1вҶ’3вҶ’вҲ’вҶ’вҠҷвҶ’4вҶ’1вҶ’в–ЎвҶ’AвҶ’2вҶ’1
    cells: [10, 11, 6, 7, 10, 11, 6, 7, 4, 8, 3, 7, 2, 6, 1, 5, 9, 14, 13, 10, 9, 10, 10, 11, 15, 16, 12, 11, 16, 15, 12, 11, 10, 7, 4, 3, 2, 1, 6, 11, 14, 13, 10, 7, 8, 12, 11, 10, 9, 5, 6, 10],
    hue: [0,190,160], glow: [30,220,190], particle: [90,245,225], core: [200,255,248]
  },
  {
    // Seq 11 (Lime): 1вҶ’в–ЎвҶ’AвҶ’BвҶ’2вҶ’3вҶ’=вҶ’+вҶ’CвҶ’3вҶ’вҠҷвҶ’4вҶ’1вҶ’в–ЎвҶ’AвҶ’BвҶ’2вҶ’+вҶ’CвҶ’3вҶ’=вҶ’вҲ’вҶ’4вҶ’вҳҶвҶ’в–івҶ’4вҶ’1вҶ’вҳҶвҶ’в–івҶ’4вҶ’2вҶ’+вҶ’3вҶ’1вҶ’в—ӢвҶ’в–івҶ’1вҶ’4вҶ’вҳҶвҶ’1
    cells: [10, 9, 5, 1, 6, 7, 4, 3, 2, 7, 12, 11, 10, 9, 5, 1, 6, 3, 2, 7, 4, 8, 11, 15, 14, 11, 10, 15, 14, 11, 6, 3, 7, 10, 13, 14, 10, 11, 15, 10],
    hue: [160,255,30], glow: [180,255,65], particle: [210,255,130], core: [235,255,215]
  },
  {
    // Seq 12 (Ice/Silver): 1вҶ’3вҶ’=вҶ’+вҶ’вҲ’вҶ’3вҶ’CвҶ’2вҶ’+вҶ’CвҶ’BвҶ’2вҶ’AвҶ’в–ЎвҶ’1вҶ’в—ӢвҶ’в–івҶ’4вҶ’вҳҶвҶ’1
    cells: [10, 7, 4, 3, 8, 7, 2, 6, 3, 2, 1, 6, 5, 9, 10, 13, 14, 11, 15, 10],
    hue: [180,190,255], glow: [200,210,255], particle: [220,225,255], core: [245,248,255]
  }
];

// в”Җв”Җв”Җ Timing (constant for ALL sequences) в”Җв”Җв”Җ
const HOLD_T  = 600;
const MOVE_T  = 500;
const PULSE_T = 500;
const PAUSE_T = 1500;

// в”Җв”Җв”Җ State в”Җв”Җв”Җ
let seqIdx = 0;
let step = 0;
let phase = 'fadein';
let pt = 0;
let trail = [];
const glow = new Float32Array(16);
let fc = 0;
let curColor = SEQUENCES[0];

// в”Җв”Җв”Җ Persistent path lines в”Җв”Җв”Җ
let pathSegments = [];
let lineOpacity = 1;
const FADEOUT_T = 800;

// в”Җв”Җв”Җ Draw symbol в”Җв”Җв”Җ
function drawSym(idx, cx, cy, sz, a) {
  ctx.save();
  const col = `rgba(180,200,230,${a})`;
  ctx.fillStyle = col;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const s = sz * 0.6;

  const numMap = {10:'1', 6:'2', 7:'3', 11:'4'};

  switch(idx) {
    case 1: case 2: case 5: {
      const ch = idx===1?'B':idx===2?'C':'A';
      ctx.font = `600 ${sz*1.15}px Georgia,serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ch, cx, cy+sz*0.03);
    } break;

    case 6: case 7: case 10: case 11: {
      ctx.font = `700 ${sz*1.2}px 'Helvetica Neue',Arial,sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(numMap[idx], cx, cy+sz*0.04);
    } break;

    case 3:
      ctx.beginPath();
      ctx.moveTo(cx-s*.55,cy); ctx.lineTo(cx+s*.55,cy);
      ctx.moveTo(cx,cy-s*.55); ctx.lineTo(cx,cy+s*.55);
      ctx.stroke();
      break;

    case 4:
      ctx.beginPath();
      ctx.moveTo(cx-s*.45,cy-s*.18); ctx.lineTo(cx+s*.45,cy-s*.18);
      ctx.moveTo(cx-s*.45,cy+s*.18); ctx.lineTo(cx+s*.45,cy+s*.18);
      ctx.stroke();
      break;

    case 8:
      ctx.beginPath();
      ctx.moveTo(cx-s*.45,cy); ctx.lineTo(cx+s*.45,cy);
      ctx.stroke();
      break;

    case 9: {
      const h=s*.32;
      ctx.strokeRect(cx-h,cy-h,h*2,h*2);
    } break;

    case 12:
      ctx.beginPath(); ctx.arc(cx,cy,s*.43,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fill();
      break;

    case 13:
      ctx.beginPath(); ctx.arc(cx,cy,s*.42,0,Math.PI*2); ctx.stroke();
      break;

    case 14: {
      const r=s*.45;
      ctx.beginPath(); ctx.moveTo(cx,cy-r);
      ctx.lineTo(cx+r*.87,cy+r*.5);
      ctx.lineTo(cx-r*.87,cy+r*.5);
      ctx.closePath(); ctx.stroke();
    } break;

    case 15: {
      const or_=s*.48, ir_=or_*.38;
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const ang=-Math.PI/2+i*Math.PI/5;
        const r=i%2?ir_:or_;
        ctx[i?'lineTo':'moveTo'](cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
      }
      ctx.closePath(); ctx.stroke();
    } break;

    case 16: {
      const mr=s*.42, off=mr*.4, ir=mr*.75;
      const xi=(ir*ir-mr*mr-off*off)/(2*off);
      const yi2=mr*mr-xi*xi;
      if(yi2>0){
        const yi=Math.sqrt(yi2);
        ctx.beginPath();
        ctx.arc(cx,cy,mr,Math.atan2(-yi,xi),Math.atan2(yi,xi),false);
        ctx.arc(cx-off,cy,ir,Math.atan2(yi,xi+off),Math.atan2(-yi,xi+off),true);
        ctx.closePath(); ctx.fill();
      }
    } break;
  }
  ctx.restore();
}

// в”Җв”Җв”Җ Draw cell в”Җв”Җв”Җ
function drawCell(i) {
  const {x,y} = xy(i);
  const g = glow[i-1];
  const half = BOX;
  ctx.save();

  const c = curColor;

  if(g>.03){
    const gr = ctx.createRadialGradient(x,y,0,x,y,BOX*4);
    gr.addColorStop(0,`rgba(${c.hue[0]},${c.hue[1]},${c.hue[2]},${g*.18})`);
    gr.addColorStop(1,`rgba(${c.hue[0]},${c.hue[1]},${c.hue[2]},0)`);
    ctx.fillStyle = gr;
    ctx.fillRect(x-BOX*4,y-BOX*4,BOX*8,BOX*8);
    ctx.shadowColor=`rgba(${c.glow[0]},${c.glow[1]},${c.glow[2]},${g*.8})`;
    ctx.shadowBlur=18*g;
  }

  const a=.25+g*.75;
  ctx.strokeStyle = g>.08
    ? `rgba(${c.glow[0]},${c.glow[1]},${c.glow[2]},${a})`
    : `rgba(140,160,190,${a})`;
  ctx.lineWidth = 1.2+g*.5;
  ctx.strokeRect(x-half,y-half,half*2,half*2);
  ctx.shadowBlur=0;
  drawSym(i, x, y, half*.9, a);
  ctx.restore();
}

// в”Җв”Җв”Җ Grid connector lines в”Җв”Җв”Җ
function drawLines() {
  ctx.save();
  ctx.strokeStyle = 'rgba(60,80,120,0.07)';
  ctx.lineWidth = 0.8;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++){
    const i=r*4+c+1, p=xy(i);
    if(c<3){ const n=xy(i+1); ctx.beginPath(); ctx.moveTo(p.x+BOX,p.y); ctx.lineTo(n.x-BOX,p.y); ctx.stroke(); }
    if(r<3){ const n=xy(i+4); ctx.beginPath(); ctx.moveTo(p.x,p.y+BOX); ctx.lineTo(p.x,n.y-BOX); ctx.stroke(); }
  }
  ctx.restore();
}

// в”Җв”Җв”Җ Flow particle + trail в”Җв”Җв”Җ
function drawParticle(x,y) {
  ctx.save();
  const c = curColor;
  const pr = BOX * 1.6;
  const gr=ctx.createRadialGradient(x,y,0,x,y,pr);
  gr.addColorStop(0,`rgba(${c.particle[0]},${c.particle[1]},${c.particle[2]},0.9)`);
  gr.addColorStop(.3,`rgba(${c.hue[0]},${c.hue[1]},${c.hue[2]},0.35)`);
  gr.addColorStop(1,`rgba(${c.hue[0]},${c.hue[1]},${c.hue[2]},0)`);
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(${c.core[0]},${c.core[1]},${c.core[2]},0.95)`;
  ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTrail() {
  const c = curColor;
  const tr = BOX * 0.8;
  for(let i=0;i<trail.length;i++){
    const t=1-i/trail.length;
    const {x,y}=trail[i];
    ctx.save();
    const gr=ctx.createRadialGradient(x,y,0,x,y,tr*t);
    gr.addColorStop(0,`rgba(${c.particle[0]},${c.particle[1]},${c.particle[2]},${t*.45})`);
    gr.addColorStop(1,`rgba(${c.particle[0]},${c.particle[1]},${c.particle[2]},0)`);
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,tr*t,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// в”Җв”Җв”Җ Draw persistent path lines в”Җв”Җв”Җ
function drawPathLines() {
  if (pathSegments.length === 0) return;
  const c = curColor;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 0; i < pathSegments.length; i++) {
    const seg = pathSegments[i];
    const a = xy(seg.from), b = xy(seg.to);
    const age = 1 - i / (pathSegments.length + 5);
    const alpha = lineOpacity * (0.3 + 0.4 * age);

    ctx.strokeStyle = `rgba(${c.glow[0]},${c.glow[1]},${c.glow[2]},${alpha * 0.3})`;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();

    ctx.strokeStyle = `rgba(${c.particle[0]},${c.particle[1]},${c.particle[2]},${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  ctx.restore();
}

// в”Җв”Җв”Җ Draw active segment в”Җв”Җв”Җ
function drawActiveSegment(fromCell, progress) {
  const seq = SEQUENCES[seqIdx];
  const toCell = seq.cells[step + 1];
  if (fromCell === toCell) return;
  const c = curColor;
  const a = xy(fromCell), b = xy(toCell);
  const ex = a.x + (b.x - a.x) * ease(progress);
  const ey = a.y + (b.y - a.y) * ease(progress);

  ctx.save();
  ctx.lineCap = 'round';

  ctx.strokeStyle = `rgba(${c.glow[0]},${c.glow[1]},${c.glow[2]},${lineOpacity * 0.25})`;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(ex, ey); ctx.stroke();

  ctx.strokeStyle = `rgba(${c.particle[0]},${c.particle[1]},${c.particle[2]},${lineOpacity * 0.6})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(ex, ey); ctx.stroke();

  ctx.restore();
}

// в”Җв”Җв”Җ Advance to next step or sequence в”Җв”Җв”Җ
function nextStep(now) {
  const seq = SEQUENCES[seqIdx];
  const from = seq.cells[step], to = seq.cells[step + 1];
  if (from !== to) {
    pathSegments.push({ from, to });
  }
  step++;
  if (step >= seq.cells.length - 1) {
    phase = 'fadeout';
    pt = now;
    trail = [];
  } else {
    phase = 'hold';
    pt = now;
  }
}

// в”Җв”Җв”Җ Main loop в”Җв”Җв”Җ
let t0 = 0;
function frame(now) {
  requestAnimationFrame(frame);
  if(!t0){ t0=now; pt=now; }
  const el = now - pt;
  glow.fill(0);
  let particle = null;

  const seq = SEQUENCES[seqIdx];
  curColor = seq;

  if (phase === 'fadeout') {
    const t = Math.min(1, el / FADEOUT_T);
    lineOpacity = 1 - ease(t);
    const cur = seq.cells[step];
    glow[cur-1] = (1 - t) * 0.6;
    if (t >= 1) {
      phase = 'pause';
      pt = now;
      pathSegments = [];
      lineOpacity = 1;
    }
  }
  else if (phase === 'pause') {
    if (el >= PAUSE_T) {
      seqIdx = (seqIdx + 1) % SEQUENCES.length;
      step = 0;
      phase = 'fadein';
      pt = now;
      curColor = SEQUENCES[seqIdx];
      pathSegments = [];
      lineOpacity = 1;
    }
  }
  else if (phase === 'fadein') {
    const cur = seq.cells[step];
    const t = Math.min(1, el / 400);
    glow[cur-1] = ease(t);
    if (t >= 1) { phase = 'hold'; pt = now; }
  }
  else if (phase === 'hold') {
    const cur = seq.cells[step];
    glow[cur-1] = 0.9 + 0.1 * Math.cos(el * .005);
    if (el >= HOLD_T) {
      const nxt = seq.cells[step + 1];
      if (cur === nxt) {
        phase = 'pulse';
        pt = now;
      } else {
        phase = 'flow';
        pt = now;
        trail = [];
      }
    }
  }
  else if (phase === 'pulse') {
    const cur = seq.cells[step];
    const t = Math.min(1, el / PULSE_T);
    const pulse = Math.sin(t * Math.PI);
    glow[cur-1] = 0.5 + 0.5 * pulse;
    if (t >= 1) { nextStep(now); }
  }
  else if (phase === 'flow') {
    const cur = seq.cells[step];
    const nxt = seq.cells[step + 1];
    const t = Math.min(1, el / MOVE_T);

    glow[cur-1] = Math.max(0, 1 - t * 1.6);
    if (t > .55) glow[nxt-1] = ease((t - .55) / .45);

    particle = lerpDirect(cur, nxt, t);
    if (fc % 2 === 0) {
      trail.unshift({...particle});
      if (trail.length > 14) trail.pop();
    }
    if (t >= 1) {
      trail = [];
      particle = null;
      nextStep(now);
    }
  }

  // в”Җв”Җв”Җ Render в”Җв”Җв”Җ
  ctx.clearRect(0, 0, W, H);
  drawLines();
  drawPathLines();
  if (phase === 'flow') {
    const cur = seq.cells[step];
    const t = Math.min(1, el / MOVE_T);
    drawActiveSegment(cur, t);
  }
  for (let i = 1; i <= 16; i++) drawCell(i);
  if (trail.length) drawTrail();
  if (particle) drawParticle(particle.x, particle.y);
  fc++;
}

requestAnimationFrame(frame);
})();
</script>
